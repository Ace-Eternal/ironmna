server:
  port: ${SERVER_PORT:8888}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/iron}
spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: false
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:8201,http://127.0.0.1:8201}
  resources:
    template-path: ${APP_TEMPLATE_PATH:../word-template/template.docx}
    export-dir: ${APP_EXPORT_DIR:${java.io.tmpdir}/ironman-exports}
